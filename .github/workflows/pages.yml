name: Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
      - 'docs/website-deployment.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --ignore-scripts

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Sync latest release metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SITE_RELEASE_CHANNEL: prerelease
        run: node website/scripts/sync-release-metadata.mjs

      - name: Build website
        env:
          SITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm --filter website run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
