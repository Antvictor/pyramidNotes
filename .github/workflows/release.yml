name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'
          cache: 'pnpm'

      - name: Install dependencies (skip native build)
        run: pnpm install --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3 -v 28.3.3

      - name: Sync version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          CURRENT_VERSION=$(node -p "require('./electron/package.json').version")
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "electron/package.json already uses version $VERSION"
          else
            cd electron && npm version "$VERSION" --no-git-tag-version
          fi

      - name: Build frontend
        run: pnpm --filter web exec vite build

      - name: Build macOS
        run: cd electron && npx electron-builder --mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/*.dmg
            release/*-mac.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'
          cache: 'pnpm'

      - name: Install dependencies (skip native build)
        run: pnpm install --ignore-scripts

      - name: Rebuild native modules for Electron
        env:
          npm_config_msvs_version: 2022
        run: npx electron-rebuild -f -w better-sqlite3 -v 28.3.3

      - name: Sync version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          $TAG_VERSION = "${{ github.ref_name }}"
          $VERSION = $TAG_VERSION -replace '^v', ''
          $CURRENT_VERSION = node -p "require('./electron/package.json').version"
          if ($CURRENT_VERSION -eq $VERSION) {
            Write-Host "electron/package.json already uses version $VERSION"
          } else {
            cd electron; npm version $VERSION --no-git-tag-version
          }

      - name: Build frontend
        run: pnpm --filter web exec vite build

      - name: Build Windows
        run: cd electron; npx electron-builder --win

      - uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: |
            release/*.exe
            release/*-win.zip

  create-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'

      - uses: actions/download-artifact@v4
        with:
          path: release

      - name: Compute release flags
        id: release-flags
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* || "$TAG" == *-beta* || "$TAG" == *-rc* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        # The metadata generator derives the same prerelease boolean from the tag.

      - name: Validate release assets
        run: node scripts/verify-release-assets.cjs --release-dir release --tag "${{ github.ref_name }}" --release-name "${{ github.ref_name }}" --repo "${{ github.repository }}"

      - name: Generate release metadata
        run: node scripts/generate-release-metadata.cjs --release-dir release --tag "${{ github.ref_name }}" --release-name "${{ github.ref_name }}" --repo "${{ github.repository }}"

      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="（无更新说明）"
          fi
          echo "$NOTES"
          echo ""
          ls -R release/
          mapfile -t ASSET_PATHS < release/publish-manifest.txt
          PRERELEASE_FLAG=()
          if [ "${{ steps.release-flags.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG+=(--prerelease)
          fi
          gh release delete "$TAG" --cleanup-tag -y 2>/dev/null || true
          gh release create "$TAG" \
            "${ASSET_PATHS[@]}" \
            --title "$TAG" \
            --notes "$NOTES" \
            "${PRERELEASE_FLAG[@]}"
