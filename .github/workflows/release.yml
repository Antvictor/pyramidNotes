name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Sync version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          cd electron && npm version "$VERSION" --no-git-tag-version

      - name: Build frontend
        run: pnpm --filter web exec vite build

      - name: Build macOS
        env:
          npm_config_target: 28.3.3
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_disturl: https://electronjs.org/headers
          npm_config_runtime: electron
        run: cd electron && npx electron-builder --mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            release/*.dmg
            release/*-mac.zip

  build-win:
    runs-on: windows-latest
    env:
      npm_config_msvs_version: 2022
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Sync version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          $TAG_VERSION = "${{ github.ref_name }}"
          $VERSION = $TAG_VERSION -replace '^v', ''
          cd electron; npm version $VERSION --no-git-tag-version

      - name: Build frontend
        run: pnpm --filter web exec vite build

      - name: Build Windows
        env:
          npm_config_target: 28.3.3
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_disturl: https://electronjs.org/headers
          npm_config_runtime: electron
        run: cd electron; npx electron-builder --win

      - uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: |
            release/*.exe
            release/*-win.zip

  create-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release

      - name: Get tag annotation
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TAG="${{ github.ref_name }}"
          git tag -l --format='%(contents)' "$TAG" > /tmp/release-body.md
          if [ ! -s /tmp/release-body.md ]; then
            echo "（无更新说明）" > /tmp/release-body.md
          fi
          echo "---" >> /tmp/release-body.md
          cat /tmp/release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
          body_path: /tmp/release-body.md
          generate_release_notes: true
          append_body: true
